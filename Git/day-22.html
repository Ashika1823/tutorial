      function reverseElement(arr) {
        let rev = [];
        for (i = arr.length - 1; i >= 0; i--) {
          rev += arr[i];
        }
        return rev;
      }
      console.log(reverseElement([1, 2, 3]));

      function reverseElement(arr) {
        let rev = [];
        for (i = arr.length - 1; i >= 0; i--) {
          rev[arr.length - 1 - i] = arr[i];
        }
        return rev;
      }
