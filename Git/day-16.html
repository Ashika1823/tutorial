<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let light = "red"; 

      switch (light) {
        case "red":
          console.log("Stop");
          break;

        case "green":
          console.log("Go");
          break;

        case "yellow":
          console.log("Get Ready");
          break;

        case "":
          console.log("Invalid Signal");
          break;

        default:
          console.log("Invalid Signal");
      }
    </script>
  </head>
  <body></body>
</html>
